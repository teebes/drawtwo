name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: drawtwo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run Django system checks
      run: |
        cd backend
        python manage.py check --deploy
      env:
        DJANGO_SETTINGS_MODULE: config.settings.base
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: False
        DB_NAME: drawtwo_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_HOST: localhost
        DB_PORT: 5432

    - name: Run migrations
      run: |
        cd backend
        python manage.py migrate
      env:
        DJANGO_SETTINGS_MODULE: config.settings.base
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: False
        DB_NAME: drawtwo_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_HOST: localhost
        DB_PORT: 5432

    - name: Run tests
      run: |
        cd backend
        python manage.py test --settings=config.settings.test
      env:
        SECRET_KEY: test-secret-key-for-ci
        DB_NAME: drawtwo_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_HOST: localhost
        DB_PORT: 5432

    - name: Test Docker build
      run: |
        # Just test that the Docker image builds successfully
        docker build -t drawtwo-backend -f backend/Dockerfile .

        # Verify the shared AI package is present in the backend image
        docker run --rm --entrypoint="" drawtwo-backend python -c "import ai.models.linear_policy"

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit

    - name: Check for security vulnerabilities
      run: |
        # Check for known security vulnerabilities in dependencies
        pip-audit -r requirements-dev.txt --output-format=json || true

        # Run static security analysis
        bandit -r backend/ -x backend/*/tests/ -f json -o bandit-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: security-report
        path: bandit-report.json
